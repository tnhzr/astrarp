# ===============================================
#  AstraRP — основная конфигурация
# ===============================================

# Язык сообщений: ru или en (загружается messages_<lang>.yml)
language: ru

# Префикс ко всем системным сообщениям плагина (MiniMessage).
prefix: "<gradient:#9d4edd:#3a86ff>[AstraRP]</gradient> "

# Включить отладочный вывод в консоль.
debug: false

banner:
  # Печатать ASCII-баннер AstraRP в консоли при запуске сервера.
  enabled: true

# Совместимость с клиентским модом ChatHeads. Мод сам ищет голову
# отправителя по тексту сообщения, поэтому если в чате видно только
# РП-имя — оригинальный никнейм неоткуда взять. Включи append_username,
# и плагин подмешает «(ник)» в конец каждого чат-сообщения тёмным
# цветом, ChatHeads начнёт находить голову. Выключай, если уже настроил
# ChatHeads через nameAliases на клиенте.
chatheads:
  enabled: true
  # Шаблон суффикса. Доступен плейсхолдер {player}.
  suffix_format: " <#1a1a1a><i>({player})</i></#1a1a1a>"
