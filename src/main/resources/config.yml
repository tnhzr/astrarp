# ===============================================
#  AstraRP — основная конфигурация
# ===============================================

# Язык сообщений: ru или en (загружается messages_<lang>.yml)
language: ru

# Префикс ко всем системным сообщениям плагина (MiniMessage).
prefix: "<gradient:#9d4edd:#3a86ff>[AstraRP]</gradient> "

# Включить отладочный вывод в консоль.
debug: false

banner:
  # Печатать ASCII-баннер AstraRP в консоли при запуске сервера.
  enabled: true
