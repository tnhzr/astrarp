# ===============================================
#  AstraRP — основная конфигурация
# ===============================================

# Язык сообщений: ru или en (загружается messages_<lang>.yml)
language: ru

# Префикс ко всем системным сообщениям плагина (MiniMessage).
prefix: "<gradient:#9d4edd:#3a86ff>[AstraRP]</gradient> "

# Включить отладочный вывод в консоль.
debug: false

banner:
  # Печатать ASCII-баннер AstraRP в консоли при запуске сервера.
  enabled: true

# Совместимость с клиентским модом ChatHeads.
#
# По умолчанию ВЫКЛЮЧЕН — суффикс «(ник)» в чате конфликтует с кастомными
# ресурс-паками (CraftEngine / ItemsAdder со своим default-фонтом), потому
# что для отправленного нами текста в их шрифтах нет глифов и видны
# квадратики. Если у тебя обычный сервер без кастомных шрифтов — включай.
#
# Универсальный путь без суффикса — настроить ChatHeads на клиенте через
# nameAliases. Команда `/astrarp chatheads-aliases` распечатает готовый
# JSON-блок со всеми текущими РП-именами → никнеймами, который надо
# вставить в `chat_heads.json5`.
chatheads:
  enabled: false
  # Шаблон суффикса. Доступен плейсхолдер {player}.
  suffix_format: " <#1a1a1a>({player})</#1a1a1a>"
