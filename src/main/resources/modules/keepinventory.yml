# ===============================================
#  Модуль 3: Smart KeepInventory
# ===============================================

# Применять правила только в PvP. PvE-смерти обрабатываются ванильно.
pvp_only: true

# Сохранять опыт вместе с инвентарём, если правило сработало.
keep_xp: true

# Сообщать жертве, что её вещи сохранены / выпали.
notify_victim: true
notify_victim_loss: false

# Подробный лог в консоль при каждом срабатывании.
debug: false

# Таблица решений: <статус_жертвы>_vs_<статус_убийцы>: <true=сохранить|false=уронить>.
# Если секция пустая или ключи отсутствуют, используется логика по умолчанию из ТЗ:
#   RP убил RP -> ронять; NRP жертва -> сохранять; RP жертва от NRP -> сохранять.
rules:
  rp_vs_rp: false
  rp_vs_nrp: true
  rp_vs_none: true
  nrp_vs_rp: true
  nrp_vs_nrp: true
  nrp_vs_none: true
  none_vs_rp: true
  none_vs_nrp: true
  none_vs_none: true
