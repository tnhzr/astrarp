# ===============================================
#  Модуль 2: РП-Имена
# ===============================================

# Время до следующей смены имени для обычных игроков (секунды).
cooldown_seconds: 300

apply:
  # Обновлять displayName (виден в чате и под кикером смерти).
  display_name: true
  # Обновлять отображаемое имя в табе.
  tab_list: true
  # MiniMessage-формат отображаемого имени. Поддерживаются плейсхолдеры
  # {rpname} и {player}.
  format: "<gold>{rpname}</gold>"

validation:
  min_length: 2
  max_length: 32
  # Минимальное и максимальное количество слов в имени.
  # min_words: 1, max_words: 2 → допустимо «Имя» или «Имя Фамилия».
  min_words: 1
  max_words: 2
  # Разрешённые символы. По умолчанию — латиница, кириллица, апостроф и дефис.
  regex: "^[A-Za-zА-Яа-яЁё][A-Za-zА-Яа-яЁё'\\-]*( [A-Za-zА-Яа-яЁё][A-Za-zА-Яа-яЁё'\\-]*)*$"

luckperms:
  write_meta: true
  meta_key: "astrarp_rpname"

brigadier:
  # Заменять цитированные РП-имена в командах на реальный ник игрока,
  # чтобы /tp "Джон Доу" работало как /tp Notch.
  enabled: true

# Напоминание игроку при заходе на сервер, если у него ещё не установлено
# РП-имя. Текст сообщения настраивается в messages_<lang>.yml: names.notify_unset.
notify_unset:
  enabled: true
  # Задержка перед отправкой напоминания (в тиках, 20 = 1 секунда).
  delay_ticks: 40
