# ===============================================
#  Модуль 5: GM-инструменты (/feel и /rpc)
# ===============================================

feel:
  # MiniMessage-формат сообщения /feel. Доступен плейсхолдер {text}.
  style: "<gray><i>{text}</i></gray>"

rpc:
  # Формат сообщений /rpc <id> "text".
  # Плейсхолдеры: {name} — отображаемое имя NPC, {style} — настроенный стиль,
  # {text} — реплика.
  format: "<gold>[ <reset>{name}<gold> ]</gold> {style}{text}"

# Текст в превью при создании персонажа (отображается в GUI).
preview_text: "Привет, путник."
